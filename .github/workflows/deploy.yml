name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main  # Set this to your default branch (e.g., main or master)

env:
  PROJECT_ID: YOUR_GCP_PROJECT_ID         # Replace with your Google Cloud Project ID
  GAR_LOCATION: us-central1               # Replace with your Artifact Registry region
  REPOSITORY: my-app-repo                 # Replace with your Artifact Registry repository name
  SERVICE: mann-app                       # Replace with your Cloud Run service name
  REGION: us-central1                     # Replace with your Cloud Run deployment region

jobs:
  deploy:
    name: Build & Deploy Application
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for authenticating via Google Workload Identity Federation

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter and Compiles Verification
        run: |
          npm run lint
          npm run build

      # --- GOOGLE CLOUD AUTHENTICATION ---
      # Option A: Authenticate using Google Workload Identity Federation (Recommended & Secure)
      # Uncomment the following section to use Workload Identity.
      # - name: Google Auth (Workload Identity)
      #   id: auth
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: 'projects/1234567890/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
      #     service_account: 'deploy-service-account@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'

      # Option B: Authenticate using a Google Service Account Key (Classic & Simple)
      # Create a Service Account, generate a JSON Key, and add it to your GitHub Secrets as GCP_SA_KEY.
      - name: Google Auth (Service Account Key)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # --- CONFIGURE DOCKER & REGISTRY ---
      - name: Authenticate Docker with Google Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # --- BUILD AND PUSH CONTAINER IMAGE ---
      - name: Build and Push Docker Container
        id: build-image
        env:
          IMAGE_NAME: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
        run: |
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME
          echo "image=$IMAGE_NAME" >> $GITHUB_OUTPUT

      # --- DEPLOY TO GOOGLE CLOUD RUN ---
      - name: Deploy to Cloud Run
        id: deploy-cloud-run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ steps.build-image.outputs.image }}
          flags: '--port=3000 --allow-unauthenticated' # Maps ingress port 3000 to Cloud Run

      - name: Output Service Details
        run: |
          echo "Deployment completed successfully!"
          echo "Active Container URL: ${{ steps.deploy-cloud-run.outputs.url }}"
